<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicles</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header class="top">
    <h1>⚜ CHRONICLES</h1>
    <div class="seed-tag">
      <span id="faseDisplay" class="fase-tag"></span>
      <span id="seedDisplay">seed: ---</span>
      <button id="btnInventory">🎒 Mochila</button>
      <button id="btnCodex">📖 Códice</button>
      <button id="btnMenu">🏠 Menu</button>
      <button id="btnNewGame">Nova Aventura</button>
    </div>
  </header>

  <main class="panels">
    <section class="panel" id="heroPanel">
      <h2>Herói</h2>
      <div id="heroContent"></div>
    </section>

    <section class="panel tree-panel" id="treePanel">
      <h2 style="align-self:flex-start;">Árvore da Jornada</h2>
      <div id="treeContent" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
    </section>

    <section class="panel" id="storyPanel">
      <h2>História</h2>
      <div id="storyContent"></div>
    </section>

    <div class="cards-wrap" id="cardsWrap">
      <button id="rerollBtn" class="reroll-btn" title="Reroll (custo)">
        <span class="reroll-icon">🔁</span>
        <div class="reroll-costs">
          <span class="gold-cost">💰25</span>
          <span class="frag-cost">💎1</span>
        </div>
      </button>

      <div class="cards-center" id="cardsCenter">
        <div class="skill-bar" id="skillBar"></div>
        <footer class="cards" id="cardsFooter"></footer>
      </div>

      <button id="musicBtn" class="music-btn" title="Música">
        🔇
      </button>
    </div>
  </main>

<audio id="bgMusic" loop>
    <source src="53-kevin-graham-main-version-47358-01-40.mp3" type="audio/mpeg">
</audio>


</div>

<div id="weatherLayer"></div>
<div id="modalRoot"></div>

<script src="data.js"></script>
<script src="game.js"></script>
</body>
</html>

<script>
  const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

let playing = false;

musicBtn.addEventListener("click", async () => {

    if(!playing){
        try{
            await music.play();
            playing = true;
            musicBtn.textContent = "🔊";
        }catch(err){
            console.error(err);
        }
    }else{
        music.pause();
        playing = false;
        musicBtn.textContent = "🔇";
    }

});
</script>
